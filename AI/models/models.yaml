namespace: Radius.AI
types:
  models:
    description: |
      The Radius.AI/models Resource Type deploys an LLM inference model endpoint.
      To deploy a model, add a models resource to the application definition Bicep
      file. The platform-engineer recipe binds this developer-facing contract to a
      managed cloud model service without exposing any module details to the app.
      ```
      resource model 'Radius.AI/models@2025-08-01-preview' = {
        name: 'model'
        properties: {
          environment: environment
          application: myApplication.id
          model: 'gpt-5-mini'
        }
      }
      ```

      To connect your container to the model, create a connection from the
      Container resource to the model as shown below.
      ```
      resource frontend 'Radius.Compute/containers@2025-08-01-preview' = {
        name: 'frontend'
        properties: {
          application: myApplication.id
          environment: environment
          containers: {
            frontend: {
              image: 'frontend:1.25'
            }
          }
          connections: {
            llm: {
              source: model.id
            }
          }
        }
      }
      ```

      The connection automatically injects environment variables into the
      container for all NON-SECRET properties from the model. The environment
      variables are named `CONNECTION_<CONNECTION-NAME>_<PROPERTY-NAME>`. In this
      example the connection name is `llm` so the environment variables will be:

      - CONNECTION_LLM_MODEL
      - CONNECTION_LLM_ENDPOINT

      The API key is NOT injected this way: it is a recipe SECRET OUTPUT (see the
      `secrets` property below). Radius writes the recipe's secret outputs into a
      managed `Radius.Security/secrets` resource named `<resourceName>-secrets`
      and exposes a read-only reference to it on the owner as `secrets` (readOnly
      `name`). The value never appears on resource reads, in logs, or in the
      resource graph. A container consumes it by binding it into an env var via
      `secretKeyRef`, using `model.properties.secrets.name` as the `secretName`
      and the desired `secrets` key (e.g. `apiKey`):
      ```
      env: {
        AZURE_API_KEY: {
          valueFrom: {
            secretKeyRef: {
              secretName: model.properties.secrets.name
              key: 'apiKey'
            }
          }
        }
      }
      ```

    apiVersions:
      '2025-08-01-preview':
        schema:
          type: object
          properties:
            environment:
              type: string
              description: "(Required) The Radius Environment ID. Typically set by the rad CLI. Typically value should be `environment`."
            application:
              type: string
              description: "(Optional) The Radius Application ID. `myApplication.id` for example."
            model:
              type: string
              default: gpt-5-mini
              description: "(Optional) The model deployment to provision. Defaults to `gpt-5-mini` if not provided."
            endpoint:
              type: string
              description: "(Read Only) The base URL used to call the model inference endpoint. Mapped from the recipe module's output."
              readOnly: true
            secrets:
              type: object
              description: "(Read Only) Secret outputs produced by the recipe. Their values are written ONLY into the managed `Radius.Security/secrets` resource — never returned on resource reads, written to logs, or stored in the resource graph. The recipe maps module outputs onto these keys via the recipe pack's `outputs.secrets` field."
              properties:
                name:
                  type: string
                  readOnly: true
                  description: "(Read Only) The name of the managed `Radius.Security/secrets` resource. Use as `secretName` in a container `secretKeyRef`."
                apiKey:
                  type: string
                  readOnly: true
                  description: "(Read Only) The API key used to authenticate to the model inference endpoint. Mapped from the recipe module's `primaryKey` output via `outputs.secrets`. Consumed whole via `secretKeyRef` (key `apiKey`); to embed it inside a larger string (for example an `Authorization` bearer-token header), bind it to a helper env var and reference it from a `value` env var with Kubernetes `$(VAR)` interpolation."
          required: [environment]
