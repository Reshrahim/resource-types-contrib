# Portability note: this schema is platform-neutral so the same Radius.AI/search
# type can work with Azure AVM (Bicep), AWS Terraform registry modules, and Kubernetes
# recipes. Only the recipePack source plus parameters/outputs mapping change per platform;
# the developer-facing properties and readOnly connection surface stay identical.
namespace: Radius.AI
types:
  search:
    description: |
      The Radius.AI/search Resource Type deploys a search service. To
      deploy a search service, add a search resource to the application
      definition Bicep file. The platform-engineer recipe provisions the concrete
      backend and maps its endpoint and API key outputs back onto this resource.
      ```
      resource search 'Radius.AI/search@2025-08-01-preview' = {
        name: 'search'
        properties: {
          environment: environment
          application: myApplication.id
        }
      }
      ```

      To connect your container to the service, create a connection from the
      Container resource to the search service as shown below.
      ```
      resource frontend 'Radius.Compute/containers@2025-08-01-preview' = {
        name: 'frontend'
        properties: {
          application: myApplication.id
          environment: environment
          container: {
            image: 'frontend:1.25'
          }
          connections: {
            search: {
              source: search.id
            }
          }
        }
      }
      ```

      The connection automatically injects environment variables into the
      container for all NON-SECRET properties from the search service. The
      environment variables are named `CONNECTION_<CONNECTION-NAME>_<PROPERTY-NAME>`.
      In this example the connection name is `search` so the environment variables
      will be:

      - CONNECTION_SEARCH_ENDPOINT

      The admin API key is NOT injected this way: it is a recipe SECRET OUTPUT
      (see the `secrets` property below). Radius writes the recipe's secret
      outputs into a managed `Radius.Security/secrets` resource named
      `<resourceName>-secrets` and exposes a read-only reference to it on the
      owner as `secrets` (readOnly `name`). The value never appears on resource
      reads, in logs, or in the resource graph. A container consumes it by binding
      it into an env var via `secretKeyRef`, using
      `searchService.properties.secrets.name` as the `secretName` and the desired
      `secrets` key (e.g. `apiKey`).

    apiVersions:
      '2025-08-01-preview':
        schema:
          type: object
          properties:
            environment:
              type: string
              description: "(Required) The Radius Environment ID. Typically set by the rad CLI. Typically value should be `environment`."
            application:
              type: string
              description: "(Optional) The Radius Application ID. `myApplication.id` for example."
            endpoint:
              type: string
              description: The endpoint used to connect to the search service. Mapped from the recipe module's output.
              readOnly: true
            secrets:
              type: object
              description: "(Read Only) Secret outputs produced by the recipe. Their values are written ONLY into the managed `Radius.Security/secrets` resource — never returned on resource reads, written to logs, or stored in the resource graph. The recipe maps module outputs onto these keys via the recipe pack's `outputs.secrets` field."
              properties:
                name:
                  type: string
                  readOnly: true
                  description: "(Read Only) The name of the managed `Radius.Security/secrets` resource. Use as `secretName` in a container `secretKeyRef`."
                apiKey:
                  type: string
                  readOnly: true
                  description: "(Read Only) The admin API key used to authenticate to the search service. Mapped from the recipe module's `primaryKey` output via `outputs.secrets`. Consumed whole via `secretKeyRef` (key `apiKey`); to embed it inside a larger string (request header or URL), bind it to a helper env var and reference it from a `value` env var with Kubernetes `$(VAR)` interpolation."
          required: [environment]
