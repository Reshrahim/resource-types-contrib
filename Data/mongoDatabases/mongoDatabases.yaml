namespace: Radius.Data
types:
  mongoDatabases:
    description: |
      The Radius.Data/mongoDatabases Resource Type deploys a Mongo-compatible
      database. To deploy a Mongo database, add a mongoDatabases resource to the
      application definition Bicep file. The Azure recipe uses Cosmos DB for
      MongoDB and exposes its endpoint and connection string as resource
      properties.
      ```
      resource database 'Radius.Data/mongoDatabases@2025-08-01-preview' = {
        name: 'mongo'
        properties: {
          environment: environment
          application: myApplication.id
          database: 'mongo_db'
        }
      }
      ```

      To connect your container to the database, create a connection from the
      Container resource to the database as shown below.
      ```
      resource frontend 'Radius.Compute/containers@2025-08-01-preview' = {
        name: 'frontend'
        properties: {
          application: myApplication.id
          environment: environment
          container: {
            image: 'frontend:1.25'
          }
          connections: {
            mongo: {
              source: database.id
            }
          }
        }
      }
      ```

      The connection automatically injects environment variables into the
      container for all NON-SECRET properties from the database. The environment
      variables are named `CONNECTION_<CONNECTION-NAME>_<PROPERTY-NAME>`. In this
      example the connection name is `mongo` so the environment variables will be:

      - CONNECTION_MONGO_DATABASE
      - CONNECTION_MONGO_ENDPOINT

      The connection string is NOT injected this way: it is a recipe SECRET
      OUTPUT (see the `secrets` property below). Radius writes the recipe's
      secret outputs into a managed `Radius.Security/secrets` resource named
      `<resourceName>-secrets` and exposes a read-only reference to it on the
      owner as `secrets` (readOnly `name`). The value never appears on resource
      reads, in logs, or in the resource graph. A container consumes it by binding
      it into an env var via `secretKeyRef`, using
      `mongo.properties.secrets.name` as the `secretName` and the desired
      `secrets` key (e.g. `connectionString`):
      ```
      env: {
        ME_CONFIG_MONGODB_URL: {
          valueFrom: {
            secretKeyRef: {
              secretName: mongo.properties.secrets.name
              key: 'connectionString'
            }
          }
        }
      }
      ```

      Portability note: this schema is platform-neutral so the same resource
      type works with Azure AVM, AWS Terraform modules, and Kubernetes recipes.
      Only the recipePack source plus parameters/outputs mapping change per
      platform; the developer-facing database knob and read-only connection
      surface stay identical.
    apiVersions:
      '2025-08-01-preview':
        schema:
          type: object
          properties:
            environment:
              type: string
              description: "(Required) The Radius Environment ID. Typically set by the rad CLI. Typically value should be `environment`."
            application:
              type: string
              description: "(Optional) The Radius Application ID. `myApplication.id` for example."
            database:
              type: string
              default: mongo_db
              description: "(Optional) The Mongo database name. Defaults to `mongo_db` if not provided."
            endpoint:
              type: string
              description: The endpoint used to connect to the database. Mapped from the recipe module's output.
              readOnly: true
            secrets:
              type: object
              description: "(Read Only) Secret outputs produced by the recipe. Their values are written ONLY into the managed `Radius.Security/secrets` resource — never returned on resource reads, written to logs, or stored in the resource graph. The recipe maps module outputs onto these keys via the recipe pack's `outputs.secrets` field."
              properties:
                name:
                  type: string
                  readOnly: true
                  description: "(Read Only) The name of the managed `Radius.Security/secrets` resource. Use as `secretName` in a container `secretKeyRef`."
                connectionString:
                  type: string
                  readOnly: true
                  description: "(Read Only) The connection string used to authenticate to the database. Mapped from the recipe module's `primaryReadWriteConnectionString` output via `outputs.secrets`. Consumed whole via `secretKeyRef` (key `connectionString`) — for example bound into `ME_CONFIG_MONGODB_URL`. To embed it inside a larger string, bind it to a helper env var and reference it from a `value` env var with Kubernetes `$(VAR)` interpolation."
          required: [environment]
