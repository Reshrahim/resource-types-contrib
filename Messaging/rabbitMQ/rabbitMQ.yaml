# Portability note: this schema is platform-neutral so the same type works with
# Azure AVM (Bicep), AWS Amazon MQ via Terraform modules, and Kubernetes RabbitMQ
# recipes. Only the recipePack source plus parameters/outputs mapping changes per
# platform; the developer-facing queue knob and readOnly connection surface stay
# identical.
namespace: Radius.Messaging
types:
  rabbitMQ:
    description: |
      The Radius.Messaging/rabbitMQ Resource Type deploys a queue-compatible
      messaging resource. In the Azure verification recipe, the platform engineer
      maps this type to Azure Service Bus using the Service Bus AMQP endpoint. This
      provisions the resource and maps its connection outputs; it does not prove
      RabbitMQ broker API compatibility.
      ```
      resource queue 'Radius.Messaging/rabbitMQ@2025-08-01-preview' = {
        name: 'rabbitmq'
        properties: {
          environment: environment
          application: myApplication.id
          queue: 'jobs'
        }
      }
      ```

      To connect your workload to the queue, create a connection from the workload
      resource to the queue resource. The connection automatically injects
      environment variables named `CONNECTION_<CONNECTION-NAME>_<PROPERTY-NAME>`
      for all NON-SECRET properties. For a connection named `rabbitmq`, the
      variables are:

      - CONNECTION_RABBITMQ_HOST

      The connection string is NOT injected this way: it is a recipe SECRET
      OUTPUT (see the `secrets` property below). Radius writes the recipe's
      secret outputs into a managed `Radius.Security/secrets` resource named
      `<resourceName>-secrets` and exposes a read-only reference to it on the
      owner as `secrets` (readOnly `name`). The value never appears on resource
      reads, in logs, or in the resource graph. A container consumes it by binding
      it into an env var via `secretKeyRef`, using
      `queue.properties.secrets.name` as the `secretName` and the desired
      `secrets` key (e.g. `connectionString`).

    apiVersions:
      '2025-08-01-preview':
        schema:
          type: object
          properties:
            environment:
              type: string
              description: "(Required) The Radius Environment ID. Typically set by the rad CLI. Typically value should be `environment`."
            application:
              type: string
              description: "(Optional) The Radius Application ID. `myApplication.id` for example."
            queue:
              type: string
              default: jobs
              description: "(Optional) The queue name to create. Defaults to `jobs` if not provided."
            host:
              type: string
              description: The host or namespace name used to connect to the queue. Mapped from the recipe module's output.
              readOnly: true
            secrets:
              type: object
              description: "(Read Only) Secret outputs produced by the recipe. Their values are written ONLY into the managed `Radius.Security/secrets` resource — never returned on resource reads, written to logs, or stored in the resource graph. The recipe maps module outputs onto these keys via the recipe pack's `outputs.secrets` field."
              properties:
                name:
                  type: string
                  readOnly: true
                  description: "(Read Only) The name of the managed `Radius.Security/secrets` resource. Use as `secretName` in a container `secretKeyRef`."
                connectionString:
                  type: string
                  readOnly: true
                  description: "(Read Only) The primary connection string used to authenticate to the queue. Mapped from the recipe module's connection-string output via `outputs.secrets`. Consumed whole via `secretKeyRef` (key `connectionString`); to embed it inside a larger string, bind it to a helper env var and reference it from a `value` env var with Kubernetes `$(VAR)` interpolation."
          required: [environment]
