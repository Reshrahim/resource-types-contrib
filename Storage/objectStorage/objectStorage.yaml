namespace: Radius.Storage
types:
  objectStorage:
    description: |
      The Radius.Storage/objectStorage Resource Type deploys an object storage
      container (an S3-style bucket / Azure Blob container / GCS bucket). To deploy
      one, add an objectStorage resource to the application definition Bicep file.
      Unlike database types, no secret is required from the developer: Azure Storage
      generates its own account keys, so the platform-engineer recipe needs no
      injected credentials.
      ```
      resource store 'Radius.Storage/objectStorage@2025-08-01-preview' = {
        name: 'store'
        properties: {
          environment: environment
          application: myApplication.id
          containerName: 'data'
        }
      }
      ```

      To connect your container to the store, create a connection from the
      Container resource to the store as shown below. This verification test is
      provisioning-only because the stock demo image has no Azure Blob backend, but
      the type still exposes a connection surface for applications that can use it.
      ```
      resource frontend 'Radius.Compute/containers@2025-08-01-preview' = {
        name: 'frontend'
        properties: {
          application: myApplication.id
          environment: environment
          container: {
            image: 'frontend:1.25'
          }
          connections: {
            storage: {
              source: store.id
            }
          }
        }
      }
      ```

      The connection automatically injects environment variables into the
      container for all NON-SECRET properties from the store. The environment
      variables are named `CONNECTION_<CONNECTION-NAME>_<PROPERTY-NAME>`. In this
      example the connection name is `storage` so the environment variables will be:

      - CONNECTION_STORAGE_CONTAINERNAME
      - CONNECTION_STORAGE_ENDPOINT
      - CONNECTION_STORAGE_ACCOUNTNAME

      The connection string and account key are NOT injected this way: they are
      recipe SECRET OUTPUTS (see the `secrets` property below). Radius writes the
      recipe's secret outputs into a managed `Radius.Security/secrets` resource
      named `<resourceName>-secrets` and exposes a read-only reference to it on the
      owner as `secrets` (readOnly `name`). The values never appear on resource
      reads, in logs, or in the resource graph. A container consumes a secret by
      binding it into an env var via `secretKeyRef`, using
      `store.properties.secrets.name` as the `secretName` and the desired
      `secrets` key (e.g. `connectionString` or `accountKey`).

      The schema is platform-neutral: the same developer-facing properties can be
      backed by Azure Blob Storage, AWS S3, or a Kubernetes object-store recipe by
      changing only the platform recipe's module source, parameters, and outputs.

    apiVersions:
      '2025-08-01-preview':
        schema:
          type: object
          properties:
            environment:
              type: string
              description: "(Required) The Radius Environment ID. Typically set by the rad CLI. Typically value should be `environment`."
            application:
              type: string
              description: "(Optional) The Radius Application ID. `myApplication.id` for example."
            containerName:
              type: string
              default: data
              description: "(Optional) The object container (blob container / S3 bucket) name to create inside the storage account. Defaults to `data` if not provided."
            endpoint:
              type: string
              description: The object storage endpoint used to connect to the store. Mapped from the recipe module's `primaryBlobEndpoint` output.
              readOnly: true
            accountName:
              type: string
              description: The Azure Storage account name. Mapped from the recipe module's `name` output.
              readOnly: true
            secrets:
              type: object
              description: "(Read Only) Secret outputs produced by the recipe. Their values are written ONLY into the managed `Radius.Security/secrets` resource — never returned on resource reads, written to logs, or stored in the resource graph. The recipe maps module outputs onto these keys via the recipe pack's `outputs.secrets` field."
              properties:
                name:
                  type: string
                  readOnly: true
                  description: "(Read Only) The name of the managed `Radius.Security/secrets` resource. Use as `secretName` in a container `secretKeyRef`."
                connectionString:
                  type: string
                  readOnly: true
                  description: "(Read Only) The Azure Storage account connection string (`DefaultEndpointsProtocol=...;AccountName=...;AccountKey=...`). Mapped from the recipe module's `primaryConnectionString` output via `outputs.secrets`. Consumed whole via `secretKeyRef` (key `connectionString`); to embed it inside a larger string, bind it to a helper env var and reference it from a `value` env var with Kubernetes `$(VAR)` interpolation."
                accountKey:
                  type: string
                  readOnly: true
                  description: "(Read Only) The Azure Storage account access key. Mapped from the recipe module's `primaryAccessKey` output via `outputs.secrets`. Consumed whole via `secretKeyRef` (key `accountKey`)."
          required: [environment]
